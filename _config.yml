remote_theme: "kitian616/jekyll-TeXt-theme@9f19980"
title: Horizon Daily
description: AI-curated daily digest of tech and research news
baseurl: "/Horizon" # the subpath of your site, e.g. /blog
url: "https://bkwhentai.top" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
  - jekyll-remote-theme
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
